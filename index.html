<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 영단어 줄다리기 - 단어 내장형</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; user-select: none; }
        .rope-container {
            position: relative; height: 60px; background: #f3f4f6;
            border-radius: 30px; overflow: hidden; display: flex;
            align-items: center; justify-content: center; border: 4px solid #e5e7eb;
        }
        .rope {
            position: absolute; width: 300%; height: 12px;
            background: repeating-linear-gradient(45deg, #8b4513, #8b4513 15px, #a0522d 15px, #a0522d 30px);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .marker {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; font-size: 3.5rem; transition: left 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .overlay-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
            color: white; backdrop-filter: blur(8px); display: flex;
        }
        .active-turn { transform: scale(1.02); box-shadow: 0 0 25px rgba(0,0,0,0.15); border-width: 6px !important; }
        .disabled-turn { opacity: 0.3; filter: grayscale(0.8); pointer-events: none; }
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .alphabet-btn { transition: all 0.1s; touch-action: manipulation; }
        .alphabet-btn:active { transform: scale(0.9); background-color: #eab308; }
        .letter-slot {
            display: inline-block;
            width: 45px;
            border-bottom: 5px solid #4b5563;
            margin: 0 6px;
            font-size: 2.8rem;
            height: 4rem;
            line-height: 4rem;
            vertical-align: bottom;
            text-align: center;
            color: #1e1b4b;
            transition: all 0.2s;
        }
        .letter-filled {
            border-bottom-color: #6366f1;
            color: #4338ca;
            animation: popIn 0.2s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        #countdown-text {
            font-size: 12rem;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
            animation: countPulse 1s infinite;
        }
        @keyframes countPulse {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex flex-col items-center p-2">

    <!-- 시작 대기 화면 -->
    <div id="start-screen" class="overlay-screen">
        <h2 class="text-5xl font-bold mb-8 text-indigo-300">⚔️ 영단어 줄다리기 ⚔️</h2>
        <p class="text-xl mb-12 opacity-80">그림 속 단어들이 모두 포함되었습니다!</p>
        <button onclick="startCountdown()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-20 py-6 rounded-full text-4xl font-bold shadow-2xl transition-all transform hover:scale-110 active:scale-95">
            게임 시작!
        </button>
    </div>

    <!-- 카운트다운 화면 -->
    <div id="countdown-screen" class="overlay-screen" style="display: none;">
        <div id="countdown-text">3</div>
    </div>

    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl p-4 sm:p-6 mt-2">
        <h1 class="text-2xl sm:text-3xl text-center mb-2 text-indigo-700 font-bold tracking-tight">⚔️ 영단어 줄다리기 (10칸 승리)</h1>
        
        <div class="rope-container mb-6">
            <div id="rope" class="rope"></div>
            <div id="marker" class="marker">🚩</div>
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-5xl font-black text-red-600 opacity-10 uppercase">WIN</div>
            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-5xl font-black text-blue-600 opacity-10 uppercase">WIN</div>
        </div>

        <div class="text-center bg-gray-50 rounded-2xl p-4 mb-4 border-2 border-gray-200">
            <div id="turn-banner" class="inline-block px-8 py-1 rounded-full text-white font-bold text-xl mb-3 bg-red-500 shadow-md">
                A팀 차례입니다!
            </div>
            
            <div id="word-slots" class="flex justify-center flex-wrap mb-2 min-h-[5.5rem] items-end"></div>
            
            <p id="question-mean" class="text-3xl text-gray-800 font-bold mb-1">단어를 준비 중입니다...</p>
            <p id="feedback" class="text-lg font-bold min-h-[1.5em] text-gray-400 italic">준비되셨나요?</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div id="zone-a" class="bg-red-50 p-4 rounded-2xl border-4 border-red-200 flex flex-col items-center transition-all duration-300 active-turn">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-2xl">🔴</span>
                    <h3 class="text-xl font-bold text-red-600">A팀</h3>
                    <span id="score-a" class="text-lg font-bold bg-red-600 text-white px-3 py-0.5 rounded-full">0</span>
                </div>
                <div id="display-a" class="w-full bg-white border-2 border-red-200 rounded-lg py-2 text-center text-2xl h-14 font-bold flex items-center justify-center text-red-600 tracking-widest"></div>
            </div>

            <div id="zone-b" class="bg-blue-50 p-4 rounded-2xl border-4 border-blue-200 flex flex-col items-center transition-all duration-300 disabled-turn">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-2xl">🔵</span>
                    <h3 class="text-xl font-bold text-blue-600">B팀</h3>
                    <span id="score-b" class="text-lg font-bold bg-blue-600 text-white px-3 py-0.5 rounded-full">0</span>
                </div>
                <div id="display-b" class="w-full bg-white border-2 border-blue-200 rounded-lg py-2 text-center text-2xl h-14 font-bold flex items-center justify-center text-blue-600 tracking-widest"></div>
            </div>
        </div>

        <div class="bg-gray-100 p-3 rounded-2xl border-2 border-gray-200 shadow-inner">
            <div id="keyboard" class="grid grid-cols-7 sm:grid-cols-9 gap-1.5 justify-center"></div>
            <div class="flex gap-2 mt-3">
                <button onclick="handleDelete()" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white font-bold py-4 rounded-xl shadow-md active:scale-95 transition-all text-xl">지우기</button>
                <button onclick="submitAnswer()" class="flex-[2.5] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-xl text-3xl active:scale-95 transition-all">정답 제출!</button>
            </div>
        </div>
    </div>

    <!-- 최종 승리 화면 -->
    <div id="win-screen" class="overlay-screen" style="display: none;">
        <span id="winner-emoji" class="text-9xl mb-4 animate-bounce">🏆</span>
        <h2 id="winner-text" class="text-7xl font-bold mb-4">A팀 승리!</h2>
        <p class="text-2xl mb-12 opacity-80">끈질긴 승부 끝에 줄을 완전히 당겼습니다!</p>
        <button onclick="resetGame()" class="bg-white text-gray-900 px-16 py-5 rounded-full text-3xl font-bold shadow-2xl active:scale-95 hover:bg-gray-100">다시 한 판 더!</button>
    </div>

    <script>
        // 이미지 표의 모든 단어 데이터 내장
        const internalWordList = [
            { word: "APPLE", mean: "사과" },
            { word: "BALL", mean: "공" },
            { word: "CAT", mean: "고양이" },
            { word: "DOG", mean: "개" },
            { word: "FIVE", mean: "5" },
            { word: "GAME", mean: "게임" },
            { word: "HAT", mean: "모자" },
            { word: "IN", mean: "~안에" },
            { word: "JUMP", mean: "뛰다" },
            { word: "KING", mean: "왕" },
            { word: "LION", mean: "사자" },
            { word: "MONKEY", mean: "원숭이" },
            { word: "NINE", mean: "9" },
            { word: "ORANGE", mean: "오렌지" },
            { word: "PIZZA", mean: "피자" },
            { word: "QUEEN", mean: "여왕" },
            { word: "RING", mean: "반지" },
            { word: "SIT", mean: "앉다" },
            { word: "TEN", mean: "10" },
            { word: "UP", mean: "~위에" },
            { word: "VIOLIN", mean: "바이올린" },
            { word: "WIND", mean: "바람" },
            { word: "SIX", mean: "6" },
            { word: "YELLOW", mean: "노란색" },
            { word: "ZEBRA", mean: "얼룩말" }
        ];

        let currentPos = 0;
        const WIN_LIMIT = 10;
        let currentWord = {};
        let scoreA = 0, scoreB = 0;
        let currentTeam = 'A', currentInput = "", isProcessing = true;

        // 키보드 생성
        const keyboard = document.getElementById('keyboard');
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(char => {
            const btn = document.createElement('button');
            btn.innerText = char;
            btn.className = "alphabet-btn bg-white border-2 border-gray-300 rounded-lg py-3 sm:py-5 text-2xl font-bold shadow-sm hover:border-indigo-400 active:bg-indigo-100";
            btn.onclick = () => { if(!isProcessing) handleInput(char); };
            keyboard.appendChild(btn);
        });

        function startCountdown() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('countdown-screen').style.display = 'flex';
            let count = 3;
            const countText = document.getElementById('countdown-text');
            countText.innerText = count;
            
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countText.innerText = count;
                } else if (count === 0) {
                    countText.innerText = "GO!";
                } else {
                    clearInterval(timer);
                    document.getElementById('countdown-screen').style.display = 'none';
                    initQuestion();
                }
            }, 1000);
        }

        function handleInput(char) {
            if (currentInput.length < currentWord.word.length) {
                currentInput += char;
                updateView();
            }
        }

        function handleDelete() {
            if (!isProcessing && currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
                updateView();
            }
        }

        function updateView() {
            document.getElementById(`display-${currentTeam.toLowerCase()}`).innerText = currentInput;
            const slots = document.querySelectorAll('.letter-slot');
            slots.forEach((slot, index) => {
                if (currentInput[index]) {
                    slot.innerText = currentInput[index];
                    slot.classList.add('letter-filled');
                } else {
                    slot.innerText = "";
                    slot.classList.remove('letter-filled');
                }
            });
        }

        function initQuestion() {
            isProcessing = false;
            currentInput = "";
            // 랜덤 단어 선택
            currentWord = internalWordList[Math.floor(Math.random() * internalWordList.length)];
            
            const slotsContainer = document.getElementById('word-slots');
            slotsContainer.innerHTML = "";
            for (let i = 0; i < currentWord.word.length; i++) {
                const slot = document.createElement('div');
                slot.className = "letter-slot";
                slotsContainer.appendChild(slot);
            }

            document.getElementById('question-mean').innerText = currentWord.mean;
            document.getElementById('display-a').innerText = "";
            document.getElementById('display-b').innerText = "";
            
            updateTurnUI();
            
            const feedback = document.getElementById('feedback');
            feedback.innerText = `${currentWord.word.length}글자 단어입니다. 맞춰보세요!`;
            feedback.className = "text-lg font-bold text-gray-400 italic";
        }

        function updateTurnUI() {
            const isA = currentTeam === 'A';
            const zoneA = document.getElementById('zone-a');
            const zoneB = document.getElementById('zone-b');
            const banner = document.getElementById('turn-banner');

            if (isA) {
                zoneA.className = "bg-red-50 p-4 rounded-2xl border-4 border-red-400 flex flex-col items-center transition-all duration-300 active-turn";
                zoneB.className = "bg-gray-50 p-4 rounded-2xl border-4 border-transparent flex flex-col items-center transition-all duration-300 disabled-turn";
                banner.innerText = "A팀 차례입니다!";
                banner.className = "inline-block px-8 py-1 rounded-full text-white font-bold text-xl mb-3 bg-red-500 shadow-md";
            } else {
                zoneB.className = "bg-blue-50 p-4 rounded-2xl border-4 border-blue-400 flex flex-col items-center transition-all duration-300 active-turn";
                zoneA.className = "bg-gray-50 p-4 rounded-2xl border-4 border-transparent flex flex-col items-center transition-all duration-300 disabled-turn";
                banner.innerText = "B팀 차례입니다!";
                banner.className = "inline-block px-8 py-1 rounded-full text-white font-bold text-xl mb-3 bg-blue-500 shadow-md";
            }
        }

        function submitAnswer() {
            if (isProcessing || currentInput.length === 0) return;
            isProcessing = true;

            const cleanInput = currentInput.trim().toUpperCase();
            const cleanTarget = currentWord.word.trim().toUpperCase();
            
            const isCorrect = cleanInput === cleanTarget;
            const feedback = document.getElementById('feedback');

            if (isCorrect) {
                feedback.innerText = `⭕ 정답! [${cleanTarget}]! 1칸 당깁니다!`;
                feedback.className = "text-xl font-bold text-green-600 animate-pulse";
                
                if (currentTeam === 'A') { currentPos--; scoreA++; }
                else { currentPos++; scoreB++; }
                
                updateVisuals();
                currentTeam = (currentTeam === 'A') ? 'B' : 'A';
                
                setTimeout(() => {
                    if (Math.abs(currentPos) < WIN_LIMIT) initQuestion();
                }, 1500);
            } else {
                document.getElementById(`zone-${currentTeam.toLowerCase()}`).classList.add('shake');
                setTimeout(() => document.getElementById(`zone-${currentTeam.toLowerCase()}`).classList.remove('shake'), 500);
                
                feedback.innerText = `❌ 아까워요! 틀렸습니다! (상대에게 기회가 넘어갑니다)`;
                feedback.className = "text-xl font-bold text-red-500";
                
                // 틀리면 반대 방향으로 조금 끌려감
                currentTeam === 'A' ? currentPos += 0.5 : currentPos -= 0.5;
                updateVisuals();

                setTimeout(() => {
                    currentTeam = (currentTeam === 'A') ? 'B' : 'A';
                    currentInput = "";
                    isProcessing = false;
                    updateTurnUI();
                    updateView();
                    feedback.innerText = "상대 팀의 차례입니다! 집중하세요!";
                    feedback.className = "text-lg font-bold text-indigo-500 italic";
                }, 2000);
            }
        }

        function updateVisuals() {
            const movePercent = currentPos * (50 / WIN_LIMIT); 
            document.getElementById('marker').style.left = `calc(50% + ${movePercent}%)`;
            document.getElementById('rope').style.transform = `translateX(${-movePercent}%)`;
            
            document.getElementById('score-a').innerText = scoreA;
            document.getElementById('score-b').innerText = scoreB;
            
            if (currentPos <= -WIN_LIMIT) endGame('A');
            else if (currentPos >= WIN_LIMIT) endGame('B');
        }

        function endGame(winner) {
            document.getElementById('win-screen').style.display = 'flex';
            document.getElementById('winner-text').innerText = `${winner}팀 승리!`;
            document.getElementById('winner-text').style.color = (winner === 'A') ? '#ef4444' : '#3b82f6';
        }

        function resetGame() {
            currentPos = 0; scoreA = 0; scoreB = 0; currentTeam = 'A';
            document.getElementById('win-screen').style.display = 'none';
            updateVisuals();
            startCountdown();
        }

        // 페이지 로드 시 즉시 실행
        window.onload = () => {
            // 로딩 화면이 필요 없으므로 바로 시작 화면 노출
        };
    </script>
</body>
</html>
