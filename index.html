<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Runner Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f9ff;
        }

        .scale-up-animation { 
            animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes scaleUp { 
            from { transform: scale(0.8); opacity: 0; } 
            to { transform: scale(1); opacity: 1; } 
        }

        .animate-shake { 
            animation: shake 0.4s ease-in-out; 
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        .animate-ping-custom {
            animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }

        .item-transition {
            will-change: transform;
        }
    </style>
</head>
<body>
    <div id="game-root" class="flex flex-col items-center justify-center w-full h-screen select-none">
        <!-- All UI will be injected here via JavaScript -->
    </div>

    <script>
        // --- 초기 상태 및 단어 목록 ---
        let words = [
            { word: "APPLE", image: "🍎" },
            { word: "BANANA", image: "🍌" },
            { word: "BIRD", image: "🐦" },
            { word: "COLOR", image: "🎨" },
            { word: "DOG", image: "🐶" },
            { word: "FISH", image: "🐟" }
        ];

        let gameState = 'START'; // START, DIFFICULTY, PLAYING, WON, OVER, ADMIN
        let difficulty = 'EASY';
        let currentWordIndex = 0;
        let collectedLetters = "";
        let score = 0;
        let hearts = 3;
        let speed = 4;
        let jump = 0;
        let isJumping = false;
        let items = [];
        
        // 비밀번호 관련
        let showPasswordInput = false;
        let passwordInputVal = "";
        let passError = false;

        // 물리/타이밍 관련
        let playerY = 0;
        let velocityY = 0;
        let lastSpawnTime = 0;
        const containerWidth = 1000;
        let requestID = null;

        // 관리자용 단어 추가 입력값
        let newWordInput = "";
        let newEmojiInput = "❓";

        const root = document.getElementById('game-root');

        // --- 핵심 로직 ---

        function render() {
            let content = "";

            if (gameState === 'PLAYING') {
                const targetWord = words[currentWordIndex].word;
                content += `
                <div class="absolute top-6 w-full max-w-4xl px-10 flex justify-between items-start z-10 pointer-events-none">
                    <div class="bg-white/95 p-5 rounded-[2.5rem] shadow-xl border-4 border-sky-300 min-w-[340px]">
                        <div class="text-[12px] font-black text-sky-500 mb-1 tracking-widest uppercase text-center">
                            ${difficulty === 'EXTREME' ? '철자를 유추하세요!' : '다음 글자를 찾으세요!'}
                        </div>
                        <div class="flex justify-center items-center gap-3 text-5xl font-black font-mono">
                            ${targetWord.split('').map((char, i) => {
                                const isCollected = collectedLetters.length > i;
                                const displayChar = (difficulty === 'EXTREME' && !isCollected) ? '?' : char;
                                return `<span class="${isCollected ? 'text-orange-500' : 'text-slate-200 border-b-4 border-slate-100 min-w-[40px] text-center'}">${displayChar}</span>`;
                            }).join('')}
                            <span class="ml-4 text-6xl animate-bounce">${words[currentWordIndex].image}</span>
                        </div>
                        <div class="mt-2 text-center text-[10px] font-bold text-slate-300 uppercase tracking-widest">${difficulty} MODE</div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div class="bg-white px-6 py-2 rounded-full font-black text-2xl shadow-lg text-orange-500 border-4 border-orange-100">${score}</div>
                        <div class="flex gap-1 bg-white/60 p-2 rounded-full border border-white">
                            ${[...Array(3)].map((_, i) => `<span class="text-3xl transition-transform ${i < hearts ? 'scale-110' : 'grayscale opacity-10 scale-90'}">❤️</span>`).join('')}
                        </div>
                    </div>
                </div>`;
            }

            // 게임 컨테이너
            content += `
            <div id="game-container" class="relative w-full max-w-5xl h-[420px] bg-gradient-to-b from-sky-200 via-sky-100 to-white border-b-[20px] border-emerald-400 overflow-hidden shadow-2xl rounded-[3.5rem] cursor-pointer">
                <!-- 캐릭터 -->
                <div class="absolute left-24 z-20" style="bottom: ${30 + jump}px">
                    <div class="text-8xl transform -scale-x-100 drop-shadow-lg">
                        ${gameState === 'WON' ? '👑' : '🏃‍♂️'}
                    </div>
                    <div class="absolute -bottom-2 left-6 bg-black/10 rounded-full blur-md"
                         style="width: ${60 - jump/6}px; height: ${10 - jump/20}px; opacity: ${Math.max(0, 1 - jump/150)}"></div>
                </div>

                <!-- 아이템 -->
                ${items.map(item => `
                    <div class="absolute flex items-center justify-center w-14 h-14 bg-white rounded-2xl shadow-[0_6px_0_#cbd5e1] border-4 border-slate-50 text-slate-300 text-4xl font-black text-blue-500 item-transition"
                         style="transform: translate3d(${item.x}px, ${-item.y - 30}px, 0); bottom: 0;">
                        ${item.letter}
                    </div>
                `).join('')}
            </div>`;

            // 모달창들 (비밀번호, 난이도, 메인, 관리자)
            if (showPasswordInput) {
                content += `
                <div class="absolute inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl text-center border-[10px] border-sky-100 w-full max-w-sm scale-up-animation">
                        <h2 class="text-2xl font-black mb-6 text-slate-800">비밀번호 입력 🔐</h2>
                        <input type="password" id="pass-input" placeholder="숫자 4자리" class="w-full p-4 rounded-2xl bg-slate-50 border-4 mb-4 text-center text-2xl font-black outline-none transition-all ${passError ? 'border-red-400 animate-shake' : 'border-slate-100 focus:border-sky-400'}" value="${passwordInputVal}">
                        ${passError ? '<p class="text-red-500 font-bold mb-4">비밀번호가 틀렸습니다!</p>' : ''}
                        <div class="flex gap-3">
                            <button onclick="closePasswordModal()" class="flex-1 bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl">취소</button>
                            <button onclick="submitPassword()" class="flex-1 bg-sky-500 text-white font-black py-4 rounded-2xl shadow-lg">확인</button>
                        </div>
                    </div>
                </div>`;
            }

            if (gameState === 'DIFFICULTY') {
                content += `
                <div class="absolute inset-0 z-50 flex items-center justify-center bg-sky-900/40 backdrop-blur-md">
                    <div class="bg-white p-12 rounded-[4rem] shadow-2xl text-center border-[14px] border-white w-full max-w-lg scale-up-animation">
                        <h2 class="text-4xl font-black mb-8 text-slate-800 tracking-tight">난이도를 골라보세요!</h2>
                        <div class="grid gap-4">
                            <button onclick="setDiff('EASY')" class="bg-emerald-500 hover:bg-emerald-600 text-white p-7 rounded-[2rem] shadow-xl text-3xl font-black">쉬운 버전 ✨</button>
                            <button onclick="setDiff('HARD')" class="bg-orange-500 hover:bg-orange-600 text-white p-7 rounded-[2rem] shadow-xl text-3xl font-black">어려운 버전 🔥</button>
                            <button onclick="setDiff('EXTREME')" class="bg-rose-600 hover:bg-rose-700 text-white p-7 rounded-[2rem] shadow-xl text-3xl font-black">완전 어려움 💀</button>
                        </div>
                    </div>
                </div>`;
            }

            if (gameState === 'ADMIN') {
                content += `
                <div class="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-6">
                    <div class="bg-white w-full max-w-xl rounded-[3rem] shadow-2xl flex flex-col max-h-[85vh] border-[12px] border-sky-50">
                        <div class="p-8 border-b-2 border-slate-100 flex justify-between items-center bg-sky-50 rounded-t-[2.2rem]">
                            <h2 class="text-3xl font-black text-slate-800 tracking-tight">단어 관리자 ⚙️</h2>
                            <button onclick="setS('START')" class="text-4xl text-slate-300 hover:text-slate-500 transition-colors">✕</button>
                        </div>
                        <div class="p-8 overflow-y-auto flex-1 bg-slate-50/50">
                            <div class="grid gap-3 mb-6">
                                ${words.map((w, i) => `
                                    <div class="flex items-center justify-between bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                                        <span class="font-black text-xl text-slate-700">${w.image} ${w.word}</span>
                                        <button onclick="removeWord(${i})" class="bg-red-50 text-red-500 font-bold px-5 py-2 rounded-xl hover:bg-red-100 transition-colors">삭제</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="p-8 bg-white border-t-2 border-slate-100 rounded-b-[3rem]">
                            <div class="flex gap-3 mb-4">
                                <input type="text" id="new-word" placeholder="단어 (예: APPLE)" class="flex-1 p-5 rounded-2xl bg-slate-50 border-2 border-slate-100 font-black text-xl outline-none focus:border-sky-400" value="${newWordInput}">
                                <input type="text" id="new-emoji" placeholder="아이콘" class="w-28 p-5 rounded-2xl bg-slate-50 border-2 border-slate-100 text-center text-3xl outline-none focus:border-sky-400" value="${newEmojiInput}">
                            </div>
                            <button onclick="addWord()" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-black py-5 rounded-2xl text-2xl shadow-lg transition-all active:scale-[0.98]">단어 추가하기</button>
                        </div>
                    </div>
                </div>`;
            }

            if (gameState === 'START' || gameState === 'WON' || gameState === 'OVER') {
                content += `
                <div class="absolute inset-0 z-30 flex items-center justify-center bg-sky-900/10 backdrop-blur-sm">
                    <div class="bg-white p-14 rounded-[4rem] shadow-2xl text-center border-[14px] border-white max-w-md w-full scale-up-animation">
                        <div class="text-[10rem] mb-6 drop-shadow-xl">
                            ${gameState === 'START' ? '🏃‍♂️' : (gameState === 'WON' ? '🏆' : '🩹')}
                        </div>
                        <h1 class="text-6xl font-black mb-4 tracking-tighter text-slate-800 uppercase">
                            ${gameState === 'START' ? "Runner" : (gameState === 'WON' ? "Success!" : "Game Over")}
                        </h1>
                        <p class="text-slate-400 font-bold mb-10 text-xl">
                            ${gameState === 'WON' ? `최종 점수: ${score}` : "영어 단어를 완성해 보세요!"}
                        </p>
                        <div class="flex flex-col gap-4">
                            <button class="w-full bg-orange-400 hover:bg-orange-500 text-white py-7 rounded-[2.2rem] text-4xl font-black shadow-[0_10px_0_#c2410c] transition-all active:translate-y-2 active:shadow-none"
                                    onclick="startDifficulty()">
                                ${gameState === 'START' ? "게임 시작" : "다시 하기"}
                            </button>
                            <button onclick="openPasswordModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-[1.5rem] text-xl font-bold shadow-[0_6px_0_#1e293b] transition-all active:translate-y-1 active:shadow-none">
                                ⚙️ 단어 관리 (선생님용)
                            </button>
                        </div>
                    </div>
                </div>`;
            }

            root.innerHTML = content;

            // 이벤트 바인딩 후 포커스 처리
            if (showPasswordInput) {
                const el = document.getElementById('pass-input');
                if (el) {
                    el.focus();
                    el.oninput = (e) => passwordInputVal = e.target.value;
                }
            }
            if (gameState === 'ADMIN') {
                const w = document.getElementById('new-word');
                const e = document.getElementById('new-emoji');
                if (w) w.oninput = (ev) => newWordInput = ev.target.value;
                if (e) e.oninput = (ev) => newEmojiInput = ev.target.value;
            }
        }

        // --- 핸들러 함수들 ---

        function setS(s) { gameState = s; render(); }

        function startDifficulty() {
            if (words.length === 0) return;
            setS('DIFFICULTY');
        }

        function setDiff(d) {
            difficulty = d;
            gameState = 'PLAYING';
            resetGameStats(d);
            render();
            requestAnimationFrame(gameLoop);
        }

        function resetGameStats(level) {
            score = 0;
            hearts = 3;
            collectedLetters = "";
            currentWordIndex = 0;
            items = [];
            const initialSpeed = level === 'EASY' ? 4 : level === 'HARD' ? 5 : 6;
            speed = initialSpeed;
            playerY = 0;
            velocityY = 0;
            lastSpawnTime = performance.now();
        }

        function openPasswordModal() {
            showPasswordInput = true;
            passwordInputVal = "";
            passError = false;
            render();
        }

        function closePasswordModal() {
            showPasswordInput = false;
            render();
        }

        function submitPassword() {
            if (passwordInputVal === "2026") {
                gameState = 'ADMIN';
                showPasswordInput = false;
                passwordInputVal = "";
                passError = false;
            } else {
                passError = true;
                passwordInputVal = "";
            }
            render();
        }

        function addWord() {
            if (newWordInput.trim().length > 0) {
                words.push({ word: newWordInput.toUpperCase().trim(), image: newEmojiInput || "❓" });
                newWordInput = "";
                newEmojiInput = "❓";
                render();
            }
        }

        function removeWord(i) {
            words.splice(i, 1);
            render();
        }

        function handleJump() {
            if (!isJumping && gameState === 'PLAYING') {
                isJumping = true;
                velocityY = 16;
            }
        }

        function handleCollision(item) {
            const targetWord = words[currentWordIndex].word;
            const nextNeededLetter = targetWord[collectedLetters.length];

            if (item.letter === nextNeededLetter) {
                score += 10;
                collectedLetters += item.letter;
                if (collectedLetters === targetWord) {
                    score += 50;
                    setTimeout(() => {
                        if (currentWordIndex < words.length - 1) {
                            currentWordIndex++;
                            collectedLetters = "";
                            speed = Math.min(speed + 0.4, 10);
                        } else {
                            gameState = 'WON';
                        }
                        render();
                    }, 300);
                }
            } else {
                hearts--;
                if (hearts <= 0) gameState = 'OVER';
            }
            render();
        }

        // --- 게임 루프 ---

        function gameLoop(time) {
            if (gameState !== 'PLAYING') return;

            // 1. 물리 계산
            if (isJumping || playerY > 0) {
                velocityY -= 0.7;
                playerY += velocityY;

                if (playerY <= 0) {
                    playerY = 0;
                    velocityY = 0;
                    isJumping = false;
                }
                jump = playerY;
            }

            // 2. 아이템 이동 및 충돌 판정
            const nextItems = [];
            const targetWord = words[currentWordIndex].word;

            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                item.x -= speed;

                // 정밀 충돌 판정 (React 버전과 동일 로직)
                const hitX = item.x > 105 && item.x < 135;
                const hitY = Math.abs((item.y + 24) - (playerY + 55)) < 35;

                if (hitX && hitY) {
                    handleCollision(item);
                    continue; 
                }

                if (item.x > -100) {
                    nextItems.push(item);
                }
            }

            // 3. 아이템 생성
            const spawnInterval = 1800 / (speed / 4);
            if (time - lastSpawnTime > spawnInterval) {
                const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                const nextNeededLetter = targetWord[collectedLetters.length];
                const spawnChance = difficulty === 'EASY' ? 0.5 : 0.3;
                const letter = (Math.random() < spawnChance && nextNeededLetter) ? nextNeededLetter : alphabet[Math.floor(Math.random() * alphabet.length)];

                nextItems.push({
                    id: Math.random(),
                    x: containerWidth + 50,
                    y: Math.random() > 0.5 ? 170 : 15,
                    letter: letter
                });
                lastSpawnTime = time;
            }

            items = nextItems;
            render();
            requestID = requestAnimationFrame(gameLoop);
        }

        // --- 초기화 및 이벤트 리스너 ---

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'PLAYING') handleJump();
                else if (gameState === 'START' || gameState === 'WON' || gameState === 'OVER') startDifficulty();
            }
            if (e.key === 'Enter') {
                if (showPasswordInput) submitPassword();
            }
        });

        document.addEventListener('click', (e) => {
            if (e.target.closest('#game-container')) {
                handleJump();
            }
        });

        // 시작 시 렌더링
        render();

    </script>
</body>
</html>
